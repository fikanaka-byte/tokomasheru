<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Mas Heru</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    .h-screen { height: 100dvh; }
    .main-scroll-area { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @media print {
      @page { size: 58mm auto; margin: 0; }
      body { margin: 0; padding: 0; }
      #root, .no-print { display: none !important; }
      #print-invoice { display: block !important; width: 58mm; padding: 4mm; font-family: 'Courier New', monospace; font-size: 9pt; background: white; }
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Um422Lqpxfi1OzEz6v9ahpu_T12lfT5jKqG6miqJ3FFAqfpOwUzfrTFaVYAPypvi/exec";

    const formatRp = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    const Icon = ({ name, className = "" }) => <span className={`material-symbols-outlined ${className}`}>{name}</span>;
    
    const showAlert = (options) => {
      if (window.Swal) window.Swal.fire({ fontFamily: 'sans-serif', ...options });
      else alert(options.title);
    };

    const findAdminFee = (nominal, layanan, fees) => {
      if (!fees || fees.length === 0) return 0;
      const match = fees.find(f => {
        const categoryInSheet = f.category.toLowerCase();
        const serviceInApp = layanan.toLowerCase();
        return serviceInApp.includes(categoryInSheet) && nominal >= f.min && nominal <= f.max;
      });
      return match ? match.fee : 0;
    };

    function App() {
      const [userRole, setUserRole] = useState(null);
      const [cashierId, setCashierId] = useState('');
      const [loading, setLoading] = useState(true);
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [balances, setBalances] = useState({ kembalian: 0, pulsa: 0, bank: 0 });
      const [storeConfig, setStoreConfig] = useState({ name: 'Toko Mas Heru', address: '', phone: '', footer: ''});
      const [adminFees, setAdminFees] = useState([]);

      useEffect(() => {
        const savedRole = localStorage.getItem('tokoHeru_role');
        const savedCashier = localStorage.getItem('tokoHeru_cashier');
        if (savedRole && savedCashier) {
          setUserRole(savedRole);
          setCashierId(savedCashier);
        }
        const loadData = async () => {
          try {
            const res = await fetch(APP_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'GET_INITIAL_DATA' })
            });
            const result = await res.json();
            if (result.status === 'success') {
              setProducts(result.data.products || []);
              setCategories(result.data.categories || []);
              setTransactions(result.data.transactions || []);
              if (result.data.balances) setBalances(result.data.balances);
              if (result.data.storeConfig) setStoreConfig(result.data.storeConfig);
              if (result.data.adminFees) setAdminFees(result.data.adminFees);
            }
          } catch (e) { console.error("Load Error", e); }
          finally { setLoading(false); }
        };
        loadData();
      }, []);

      const handleLoginSuccess = (role, code) => {
        setUserRole(role);
        setCashierId(code);
        localStorage.setItem('tokoHeru_role', role);
        localStorage.setItem('tokoHeru_cashier', code);
      };

      const handleLogout = () => {
        setUserRole(null);
        setCashierId('');
        localStorage.removeItem('tokoHeru_role');
        localStorage.removeItem('tokoHeru_cashier');
      };

      const syncToGoogleSheets = async (action, data) => {
        try {
          await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data, timestamp: new Date().toISOString() })
          });
        } catch (error) { console.error("Sync Error:", error); }
      };

      if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-600 text-white text-2xl font-bold italic">Bismillah...</div>;
      
      if (!userRole) return <LoginScreen onLogin={handleLoginSuccess} />;

      return (
        <div className="min-h-screen bg-slate-50">
          {userRole === 'kasir' ? (
            <KasirDashboard 
              products={products} categories={categories} storeConfig={storeConfig} 
              cashierId={cashierId} transactions={transactions} adminFees={adminFees}
              onLogout={handleLogout} 
              onTransactionSuccess={(trx) => {
                setTransactions(prev => [trx, ...prev]);
                syncToGoogleSheets('ADD_TRANSACTION', trx);
                setBalances(prev => {
                  const nb = { ...prev };
                  if (trx.method === 'Cash') nb.kembalian += trx.total;
                  else if (trx.method === 'MESIN EDC') nb.bank += trx.total;
                  trx.items.forEach(i => {
                    const sub = i.price * i.qty;
                    if (i.category === 'Tarik Tunai') nb.kembalian -= sub;
                    else if (['Pulsa', 'Paket Data'].includes(i.category)) nb.pulsa -= sub;
                    else if (i.category === 'Transfer') nb.bank -= sub;
                  });
                  syncToSheets('UPDATE_BALANCES', nb);
                  return nb;
                });
              }}
            />
          ) : (
            <AdminDashboard 
              products={products} setProducts={setProducts} categories={categories} setCategories={setCategories}
              transactions={transactions} balances={balances} setBalances={setBalances}
              storeConfig={storeConfig} setStoreConfig={setStoreConfig}
              onLogout={handleLogout} syncToSheets={syncToGoogleSheets}
            />
          )}
        </div>
      );
    }

    // --- LOGIN SCREEN ---
    function LoginScreen({ onLogin }) {
      const [role, setRole] = useState('kasir');
      const [pin, setPin] = useState('');
      const [cashierCode, setCashierCode] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!pin.trim() || (role === 'kasir' && !cashierCode.trim())) {
          showAlert({ icon: 'warning', title: 'Isi data lengkap!' });
          return;
        }
        try {
          showAlert({ title: 'Memverifikasi...', allowOutsideClick: false, didOpen: () => window.Swal.showLoading() });
          const loginData = {
            cashierCode: role === 'admin' ? 'ADMIN' : cashierCode.trim().toUpperCase(),
            pin: pin.trim()
          };
          const response = await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'CHECK_LOGIN', data: loginData })
          });
          const result = await response.json();
          window.Swal.close();
          if (result.valid) onLogin(role, loginData.cashierCode);
          else showAlert({ icon: 'error', title: 'Login Gagal', text: result.message });
        } catch (err) { showAlert({ icon: 'error', title: 'Error Koneksi' }); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-4">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md p-8">
            <h1 className="text-2xl font-bold text-center mb-6">Toko Mas Heru</h1>
            <form onSubmit={handleLogin} className="space-y-4">
              <div className="flex gap-2">
                <button type="button" onClick={() => setRole('kasir')} className={`flex-1 py-2 rounded-xl ${role === 'kasir' ? 'bg-indigo-600 text-white' : 'bg-gray-100'}`}>Kasir</button>
                <button type="button" onClick={() => setRole('admin')} className={`flex-1 py-2 rounded-xl ${role === 'admin' ? 'bg-red-500 text-white' : 'bg-gray-100'}`}>Admin</button>
              </div>
              {role === 'kasir' && <input type="text" placeholder="KODE KASIR" value={cashierCode} onChange={e => setCashierCode(e.target.value)} className="w-full p-3 border rounded-xl text-center font-bold" />}
              <input type="password" placeholder="PIN" value={pin} onChange={e => setPin(e.target.value)} className="w-full p-3 border rounded-xl text-center text-2xl tracking-widest" />
              <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-xl font-bold">MASUK</button>
            </form>
          </div>
        </div>
      );
    }

    // --- KASIR DASHBOARD ---
    function KasirDashboard({ products, categories, storeConfig, cashierId, transactions, adminFees, onLogout, onTransactionSuccess }) {
      const [cart, setCart] = useState([]);
      const [activeCategory, setActiveCategory] = useState('Semua');
      const [searchQuery, setSearchQuery] = useState('');
      const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);
      const [showPayment, setShowPayment] = useState(false);
      const [paymentAmount, setPaymentAmount] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [lastInvoice, setLastInvoice] = useState(null);

      const filteredProducts = products.filter(p => (activeCategory === 'Semua' || p.category === activeCategory) && p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const totalBelanja = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

      const addToCart = (p) => {
        setCart(prev => {
          const exist = prev.find(item => item.id === p.id);
          if (exist) return prev.map(item => item.id === p.id ? { ...item, qty: item.qty + 1 } : item);
          return [...prev, { ...p, qty: 1 }];
        });
      };

      const processPayment = () => {
        const bayar = parseInt(paymentAmount) || 0;
        if (bayar < totalBelanja) return showAlert({ icon: 'error', title: 'Uang Kurang' });
        
        const trx = {
          id: `INV-${Date.now().toString().slice(-6)}`,
          date: new Date().toISOString(),
          cashierId, items: cart, total: totalBelanja, payment: bayar, change: bayar - totalBelanja, method: paymentMethod
        };
        setLastInvoice(trx);
        onTransactionSuccess(trx);
        setCart([]);
        setShowPayment(false);
      };

      return (
        <div className="flex h-screen overflow-hidden flex-col md:flex-row">
          <div className="flex-1 flex flex-col overflow-hidden">
            <header className="bg-white p-4 shadow-sm flex justify-between items-center">
              <h2 className="font-bold">Toko Mas Heru <span className="text-xs text-gray-400">({cashierId})</span></h2>
              <div className="flex gap-2">
                <input type="text" placeholder="Cari..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="border rounded-full px-4 py-1 text-sm outline-none focus:border-indigo-500" />
                <button onClick={onLogout} className="text-red-500"><Icon name="logout" /></button>
              </div>
            </header>
            
            <div className="p-4 flex gap-2 overflow-x-auto hide-scrollbar">
              <button onClick={() => setActiveCategory('Semua')} className={`px-4 py-1 rounded-full whitespace-nowrap ${activeCategory === 'Semua' ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>Semua</button>
              {categories.map(c => <button key={c.id} onClick={() => setActiveCategory(c.name)} className={`px-4 py-1 rounded-full whitespace-nowrap ${activeCategory === c.name ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>{c.name}</button>)}
            </div>

            <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
              {filteredProducts.map(p => (
                <div key={p.id} onClick={() => addToCart(p)} className="bg-white p-3 rounded-2xl border hover:border-indigo-500 cursor-pointer transition-all">
                  <div className="h-24 bg-gray-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                    {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Icon name="inventory_2" className="text-gray-200 text-3xl" />}
                  </div>
                  <h4 className="text-sm font-bold truncate uppercase">{p.name}</h4>
                  <p className="text-indigo-600 font-bold">{formatRp(p.price)}</p>
                </div>
              ))}
            </div>
          </div>

          {/* KERANJANG DESKTOP */}
          <div className="hidden md:flex w-80 bg-white border-l flex-col">
            <div className="p-4 border-b font-bold flex items-center gap-2"><Icon name="shopping_cart" /> Keranjang</div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {cart.map(item => (
                <div key={item.id} className="flex justify-between items-center text-sm">
                  <div className="flex-1 truncate pr-2"><div>{item.name}</div><div className="text-xs text-gray-400">{formatRp(item.price)}</div></div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: Math.max(1, i.qty-1)} : i))} className="w-6 h-6 border rounded">-</button>
                    <span>{item.qty}</span>
                    <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty+1} : i))} className="w-6 h-6 border rounded">+</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="p-4 bg-gray-50 border-t">
              <div className="flex justify-between font-bold mb-4"><span>Total</span><span>{formatRp(totalBelanja)}</span></div>
              <button onClick={() => setShowPayment(true)} disabled={cart.length === 0} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold disabled:bg-gray-300">BAYAR</button>
            </div>
          </div>

          {/* MODAL PEMBAYARAN */}
          {showPayment && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-3xl w-full max-w-sm">
                <h3 className="text-center font-bold text-gray-400 mb-2">Total Tagihan</h3>
                <div className="text-3xl font-black text-center text-indigo-600 mb-6">{formatRp(totalBelanja)}</div>
                <input type="number" placeholder="Uang Diterima" value={paymentAmount} onChange={e => setPaymentAmount(e.target.value)} className="w-full p-4 border-2 rounded-2xl text-2xl text-center mb-4" autoFocus />
                <div className="flex gap-2">
                  <button onClick={() => setShowPayment(false)} className="flex-1 py-3 bg-gray-100 rounded-xl">Batal</button>
                  <button onClick={processPayment} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Proses</button>
                </div>
              </div>
            </div>
          )}

          {/* STRUK DIGITAL */}
          {lastInvoice && (
            <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-3xl w-full max-w-sm">
                <div id="print-invoice" className="font-mono text-xs p-4 border mb-4 bg-white text-black">
                  <center className="mb-2"><strong>{storeConfig.name}</strong><br/>{storeConfig.address}</center>
                  <div className="border-b border-dashed my-2"></div>
                  {lastInvoice.items.map(i => <div key={i.id} className="flex justify-between"><span>{i.name} x{i.qty}</span><span>{formatRp(i.price*i.qty)}</span></div>)}
                  <div className="border-b border-dashed my-2"></div>
                  <div className="flex justify-between font-bold"><span>TOTAL</span><span>{formatRp(lastInvoice.total)}</span></div>
                  <div className="flex justify-between"><span>BAYAR</span><span>{formatRp(lastInvoice.payment)}</span></div>
                  <div className="flex justify-between"><span>KEMBALI</span><span>{formatRp(lastInvoice.change)}</span></div>
                  <center className="mt-4">{storeConfig.footer}</center>
                </div>
                <div className="grid grid-cols-2 gap-2">
                   <button onClick={() => window.print()} className="bg-indigo-600 text-white py-2 rounded-xl">Cetak</button>
                   <button onClick={() => setLastInvoice(null)} className="bg-gray-100 py-2 rounded-xl">Tutup</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- ADMIN DASHBOARD ---
    function AdminDashboard({ products, setProducts, categories, setCategories, transactions, balances, setBalances, storeConfig, setStoreConfig, onLogout, syncToSheets }) {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          <div className="w-full md:w-64 bg-slate-900 text-white flex md:flex-col overflow-x-auto">
            <div className="p-6 font-bold text-xl border-b border-slate-800">Admin Panel</div>
            <nav className="flex-1 p-4 flex md:flex-col gap-2">
              <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl flex gap-2 ${activeTab === 'dashboard' ? 'bg-indigo-600' : ''}`}><Icon name="dashboard"/> Dashboard</button>
              <button onClick={() => setActiveTab('products')} className={`p-3 rounded-xl flex gap-2 ${activeTab === 'products' ? 'bg-indigo-600' : ''}`}><Icon name="inventory_2"/> Barang</button>
              <button onClick={() => setActiveTab('balances')} className={`p-3 rounded-xl flex gap-2 ${activeTab === 'balances' ? 'bg-indigo-600' : ''}`}><Icon name="account_balance_wallet"/> Saldo</button>
            </nav>
            <button onClick={onLogout} className="p-6 text-red-400 flex gap-2"><Icon name="logout"/> Keluar</button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 md:p-8">
            {activeTab === 'dashboard' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-indigo-100">
                  <div className="text-gray-400 text-sm">Total Pendapatan</div>
                  <div className="text-2xl font-black text-indigo-600">{formatRp(transactions.reduce((s, t) => s + t.total, 0))}</div>
                </div>
              </div>
            )}
            {activeTab === 'products' && <AdminProducts products={products} setProducts={setProducts} categories={categories} syncToSheets={syncToSheets} />}
            {activeTab === 'balances' && <AdminBalances balances={balances} setBalances={setBalances} syncToSheets={syncToSheets} />}
          </div>
        </div>
      );
    }

    function AdminProducts({ products, setProducts, categories, syncToSheets }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [formData, setFormData] = useState({ id: '', name: '', price: '', category: '', stock: '', image: '' });

      const saveProduct = (e) => {
        e.preventDefault();
        const payload = { ...formData, price: parseInt(formData.price), stock: parseInt(formData.stock) };
        setProducts([...products, payload]);
        syncToSheets('ADD_PRODUCT', payload);
        setIsModalOpen(false);
      };

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm">
          <div className="flex justify-between items-center mb-6">
            <h3 className="font-bold text-lg">Kelola Barang</h3>
            <button onClick={() => { setFormData({ id: Date.now(), name: '', price: '', category: categories[0]?.name, stock: '', image: '' }); setIsModalOpen(true); }} className="bg-indigo-600 text-white px-4 py-2 rounded-xl">+ Tambah</button>
          </div>
          <table className="w-full text-left">
            <thead><tr className="text-gray-400 text-sm border-b"><th>Nama</th><th>Harga</th><th>Stok</th></tr></thead>
            <tbody>{products.map(p => <tr key={p.id} className="border-b"><td>{p.name}</td><td>{formatRp(p.price)}</td><td>{p.stock}</td></tr>)}</tbody>
          </table>
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <form onSubmit={saveProduct} className="bg-white p-6 rounded-3xl w-full max-w-md space-y-4">
                <input required placeholder="Nama Barang" className="w-full p-2 border rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                <input required type="number" placeholder="Harga" className="w-full p-2 border rounded" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                <input required type="number" placeholder="Stok" className="w-full p-2 border rounded" value={formData.stock} onChange={e => setFormData({...formData, stock: e.target.value})} />
                <select className="w-full p-2 border rounded" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                <div className="flex gap-2"><button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-gray-100 py-2 rounded">Batal</button><button type="submit" className="flex-1 bg-indigo-600 text-white py-2 rounded">Simpan</button></div>
              </form>
            </div>
          )}
        </div>
      );
    }

    function AdminBalances({ balances, setBalances, syncToSheets }) {
      const updateBalance = (key) => {
        window.Swal.fire({
          title: `Update Saldo ${key}`,
          input: 'number',
          showCancelButton: true
        }).then(res => {
          if (res.isConfirmed) {
            const newVal = parseInt(res.value) || 0;
            const nb = { ...balances, [key]: newVal };
            setBalances(nb);
            syncToSheets('UPDATE_BALANCES', nb);
          }
        });
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {Object.entries(balances).map(([k, v]) => (
            <div key={k} className="bg-white p-6 rounded-3xl border text-center">
              <div className="uppercase text-xs text-gray-400 mb-1">{k}</div>
              <div className="text-xl font-bold mb-4">{formatRp(v)}</div>
              <button onClick={() => updateBalance(k)} className="text-indigo-600 text-sm font-bold">Ubah Saldo</button>
            </div>
          ))}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
